# SEAM Rules Configuration
# Version: SEAM-R-v1.0
# Methodology: SEAM-M-v1.0
# Effective: June 2026
#
# This file defines all scoring weights, thresholds and floor rules.
# The engine reads from this file. Rules are never hardcoded.
# Increment version on any change. Archive previous versions.

version: "SEAM-R-v1.0"
methodology_version: "SEAM-M-v1.0"
effective_date: "2026-06-01"
description: "Initial production ruleset. Zambia-first. Six dimensions. Five verdict thresholds."

# ── DIMENSION WEIGHTINGS ──────────────────────────────────────────────────────
# Must sum to 1.0

dimensions:
  D1:
    name: "Jurisdiction Stability"
    weight: 0.25
  D2:
    name: "Revenue Transparency"
    weight: 0.20
  D3:
    name: "Asset Data Quality"
    weight: 0.20
  D4:
    name: "Local Content Compliance Posture"
    weight: 0.15
  D5:
    name: "Infrastructure Readiness"
    weight: 0.12
  D6:
    name: "Capital Access Signals"
    weight: 0.08

# ── D1 SUB-COMPONENT WEIGHTS ──────────────────────────────────────────────────

d1_sub_weights:
  fraser_institute: 0.50
  wb_rule_of_law: 0.25
  wb_regulatory_quality: 0.25

d1_adjustments:
  regulatory_change_last_12m: -5
  mining_code_revision_in_progress: -3
  investment_arbitration_last_5y: -8
  bilateral_investment_treaty: +3
  eiti_compliant_country: +3

d1_floor:
  rule: "D1-FLOOR-001"
  description: "WB Rule of Law below 40 caps D1 score at 85"
  wb_rule_of_law_threshold: 40
  max_score_when_triggered: 85

