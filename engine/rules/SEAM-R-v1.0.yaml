# ── VERDICT THRESHOLDS ────────────────────────────────────────────────────────

verdicts:
  - code: "PROCEED"
    min: 80
    max: 100
    label: "Public data confirms the asset meets minimum thresholds across all six dimensions. The evidence base is sufficient to support commissioning full technical due diligence."
    next_action: "Commission independent NI43-101 or JORC compliant resource estimate verification. Estimated cost £150k–£300k. Estimated timeline 8–12 weeks."

  - code: "PROCEED WITH CONDITIONS"
    min: 65
    max: 79
    label: "Asset meets threshold on at least four of six dimensions. Specific gaps are identified and cited in the Evidence Envelope. These gaps are resolvable before full commitment."
    next_action: "Address the named conditions identified in the Evidence Envelope. Return for re-score once conditions are met."

  - code: "MONITOR"
    min: 45
    max: 64
    label: "Asset has genuine potential but one or more dimensions are in flux. Premature to commit due diligence spend."
    next_action: "SEAM places this asset on 90-day monitoring cycle. Act when the data moves — not when an advisor remembers to call."

  - code: "CAUTION"
    min: 25
    max: 44
    label: "Specific red flags identified in the evidence base. Named, cited and reproducible. Some flags may be resolvable — SEAM distinguishes structural from addressable problems."
    next_action: "Review the named red flags in the Evidence Envelope. Identify which are resolvable at asset level and which are structural."

  - code: "AVOID"
    min: 0
    max: 24
    label: "Evidence base shows fundamental problems across multiple dimensions that cannot be resolved at asset level."
    next_action: "Stand down. The Evidence Envelope provides documented rationale for declining — ready to present to an investment committee as the basis for a no-go decision without further spend."

# ── FLOOR RULES ───────────────────────────────────────────────────────────────

floor_rules:
  - code: "FLOOR-D2-001"
    dimension: "D2"
    condition: "score_below"
    threshold: 20
    max_verdict: "CAUTION"
    description: "D2 (Revenue Transparency) below 20 — maximum verdict is CAUTION regardless of aggregate score"

  - code: "FLOOR-D1-001"
    dimension: "D1"
    condition: "score_below"
    threshold: 25
    max_verdict: "MONITOR"
    description: "D1 (Jurisdiction Stability) below 25 — maximum verdict is MONITOR regardless of aggregate score"

  - code: "FLOOR-D3-001"
    dimension: "D3"
    condition: "score_below"
    threshold: 15
    max_verdict: "CAUTION"
    description: "D3 (Asset Data Quality) below 15 — maximum verdict is CAUTION regardless of aggregate score"

  - code: "FLOOR-BO-001"
    dimension: "D2"
    condition: "beneficial_ownership_none"
    threshold: null
    max_verdict: "CAUTION"
    description: "Beneficial ownership cannot be traced to individual natural persons — maximum verdict is CAUTION"

# ── MONITORING ────────────────────────────────────────────────────────────────

monitoring:
  score_delta_alert_threshold: 5
  snippet_dimensions: ["D1", "D2", "D3"]
